<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bingo Junino - Instituto Robert Bosch</title>
    <link rel="icon" type="image/x-icon" href="favicon.png">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body>

    <!-- Toast container -->
    <div id="toastContainer" class="toast-container" aria-live="polite" aria-atomic="true"></div>

    <div class="credit-tag">Created by: <span>Erick Leguisamon</span></div>

    <div class="page-wrapper">

        <!-- HEADER -->
        <header class="site-header">
            <div class="header-inner">
                <div class="header-brand">
                    <img src="imagens/logo.svg" alt="Logo Instituto Robert Bosch" class="logo">
                    <div class="header-titles">
                        <h1 class="site-title">Bingo Junino</h1>
                        <span class="site-sub">Instituto Robert Bosch</span>
                    </div>
                </div>
                <div class="header-badge">
                    <div class="header-badge-count">
                        <span id="headerCount">0</span><span class="badge-total">/30</span>
                    </div>
                    <span class="badge-label">sorteados</span>
                </div>
            </div>
        </header>

        <!-- MAIN -->
        <main class="layout">

            <!-- COLUNA ESQUERDA: SORTEIO -->
            <section class="card sorteio-card">
                <div class="card-eyebrow">Sorteio atual</div>

                <div class="stage-wrapper">
                    <!-- Anel de progresso SVG -->
                    <svg class="progress-ring" viewBox="0 0 320 320" aria-hidden="true">
                        <circle class="ring-track" cx="160" cy="160" r="145"/>
                        <circle class="ring-fill" id="ringFill" cx="160" cy="160" r="145"/>
                    </svg>
                    <div class="current-image" id="imagemSorteada">
                        <p class="placeholder-text">Clique em<br><strong>Sortear</strong></p>
                    </div>
                </div>

                <p class="item-name" id="itemName">&nbsp;</p>

                <div class="btn-row">
                    <button id="btnSortear" class="btn btn-primary">
                        <i data-lucide="shuffle" width="18" height="18"></i>
                        Sortear
                    </button>
                    <button id="btnBingo" class="btn btn-success">
                        <i data-lucide="party-popper" width="18" height="18"></i>
                        BINGO!
                    </button>
                </div>
            </section>

            <!-- COLUNA DIREITA -->
            <aside class="right-col">

                <!-- ÚLTIMOS SORTEADOS -->
                <div class="card historico-card">
                    <div class="card-eyebrow">Últimos sorteados</div>
                    <div id="listaSorteados" class="sorteados-grid"></div>
                </div>

                <!-- VENCEDORES / PLACAR -->
                <div class="card vencedores-card">
                    <div class="card-eyebrow">Placar</div>
                    <div class="vencedores-list">

                        <div class="vencedor vencedor--gold" id="vencedor1">
                            <div class="medal-icon">
                                <i data-lucide="trophy" width="18" height="18"></i>
                            </div>
                            <div class="venc-info">
                                <span class="venc-lugar">1º Lugar</span>
                                <span class="venc-nome empty" id="nome1">Aguardando…</span>
                            </div>
                        </div>

                        <div class="vencedor vencedor--silver" id="vencedor2">
                            <div class="medal-icon">
                                <i data-lucide="medal" width="18" height="18"></i>
                            </div>
                            <div class="venc-info">
                                <span class="venc-lugar">2º Lugar</span>
                                <span class="venc-nome empty" id="nome2">Aguardando…</span>
                            </div>
                        </div>

                        <div class="vencedor vencedor--bronze" id="vencedor3">
                            <div class="medal-icon">
                                <i data-lucide="award" width="18" height="18"></i>
                            </div>
                            <div class="venc-info">
                                <span class="venc-lugar">3º Lugar</span>
                                <span class="venc-nome empty" id="nome3">Aguardando…</span>
                            </div>
                        </div>

                    </div>
                </div>

            </aside>
        </main>
    </div>

    <!-- POPUP DE BINGO -->
    <div id="bingoPopup" class="popup" role="dialog" aria-modal="true" aria-labelledby="bingoPopupTitle">
        <div class="popup-content">
            <button class="close-popup" aria-label="Fechar">
                <i data-lucide="x" width="18" height="18"></i>
            </button>
            <div class="popup-header">
                <div class="popup-icon-wrap">
                    <i data-lucide="star" width="28" height="28"></i>
                </div>
                <h2 id="bingoPopupTitle">Registrar Bingo</h2>
            </div>

            <div class="form-group">
                <label for="vencedorNome">Nome do vencedor</label>
                <input type="text" id="vencedorNome" placeholder="Digite o nome completo" autocomplete="off">
            </div>

            <div class="form-group">
                <label for="pesquisaItem">Filtrar itens sorteados</label>
                <input type="text" id="pesquisaItem" placeholder="Buscar...">
            </div>

            <div class="itens-sorteados-container">
                <p class="itens-label">Itens sorteados até agora</p>
                <div id="itensSorteadosLista" class="itens-sorteados-lista"></div>
            </div>

            <button id="confirmarBingo" class="btn btn-success btn-full">
                <i data-lucide="check-circle" width="18" height="18"></i>
                Confirmar Bingo
            </button>
        </div>
    </div>

    <!-- CONFIRM MODAL (substitui alert/confirm nativos) -->
    <div id="confirmModal" class="confirm-modal" role="dialog" aria-modal="true" aria-labelledby="confirmTitle">
        <div class="confirm-modal-content">
            <div class="confirm-icon">
                <i data-lucide="alert-circle" width="28" height="28"></i>
            </div>
            <h3 id="confirmTitle">Atenção</h3>
            <p id="confirmMessage">Mensagem aqui</p>
            <div class="confirm-actions">
                <button id="confirmOk" class="btn btn-primary">
                    <i data-lucide="check" width="16" height="16"></i>
                    OK
                </button>
                <button id="confirmCancel" class="btn btn-ghost" style="display:none">Cancelar</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        // Inicializa Lucide após o script principal
        lucide.createIcons();

        async function fetchWinners() {
            try {
                const response = await fetch('https://api.jsonbin.io/v3/b/68523cc48561e97a5026386a/latest', {
                    headers: { 'X-Master-Key': '$2a$10$nGC0x4ZGIrrDOp.2XXhZ1.Fb9T2T.Fk05XB418S.9LZrzsdMvVHuS' }
                });
                if (!response.ok) throw new Error();
                const data = await response.json();
                const p = data.record.participantes || [];
                setWinnerName('nome3', p.length >= 1 ? p[p.length-1] : null);
                setWinnerName('nome2', p.length >= 2 ? p[p.length-2] : null);
                setWinnerName('nome1', p.length >= 3 ? p[p.length-3] : null);
            } catch(e) { console.error(e); }
        }

        function setWinnerName(id, name) {
            const el = document.getElementById(id);
            if (!el) return;
            if (name) {
                el.textContent = name;
                el.classList.remove('empty');
            } else {
                el.textContent = 'Aguardando…';
                el.classList.add('empty');
            }
        }

        setInterval(fetchWinners, 3000);
        fetchWinners();
    </script>

    <!-- Preload de imagens -->
    <div style="display:none;" aria-hidden="true">
        <img src="imagens/milho.png"><img src="imagens/fogueira.png"><img src="imagens/balão.png">
        <img src="imagens/chapéu.png"><img src="imagens/paçoca.png"><img src="imagens/quentão.png">
        <img src="imagens/canjica.png"><img src="imagens/bandeirinha.png"><img src="imagens/sanfona.png">
        <img src="imagens/quadrilha.png"><img src="imagens/pé-de-moleque.png"><img src="imagens/cuscuz.png">
        <img src="imagens/pinhão.png"><img src="imagens/bolo.png"><img src="imagens/cocada.png">
        <img src="imagens/curau.png"><img src="imagens/casal.png"><img src="imagens/pescaria.png">
        <img src="imagens/argola.png"><img src="imagens/corrida-de-saco.png"><img src="imagens/pau-de-sebo.png">
        <img src="imagens/tiro-ao-alvo.png"><img src="imagens/boca-do-palhaço.png"><img src="imagens/espantalho.png">
        <img src="imagens/tecido.png"><img src="imagens/arroz.png"><img src="imagens/maca-do-amor.png">
        <img src="imagens/pipoca.png"><img src="imagens/cachorro-quente.png"><img src="imagens/bingo.png">
    </div>
</body>
</html>
